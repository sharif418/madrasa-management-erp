services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: madrasa-erp:latest
    container_name: madrasa-erp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - MM_SECRET=${MM_SECRET:-change-me-in-production}
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./data:/app/db
